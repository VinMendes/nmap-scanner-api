<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Scanner Nmap</title>

  <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<header>
  <h1>Scanner Nmap</h1>

  <p class="subtitle">
    Execute um novo scan informando o target
  </p>

  <nav>
    <a href="/">Scanner</a>
    <a href="/historico/index.html">Histórico</a>
  </nav>
</header>

<section class="scan-card">

  <label for="target">Target</label>

  <div class="form-row">
    <input
            id="target"
            type="text"
            value="localhost"
            placeholder="Ex: localhost, 192.168.0.1"
    >

    <button onclick="rodarScan()">
      Rodar scan
    </button>
  </div>

  <p id="statusMessage" class="subtitle"></p>

</section>

<main id="resultadoContainer"></main>

<script src="/js/scanner.js"></script>

</body>
</html>
