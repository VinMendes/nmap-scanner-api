<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Histórico de Scans</title>

  <link rel="stylesheet" href="/antigos/cssigos/css/style.css">
</head>

<body>

<header>

  <h1>Histórico de Scans</h1>

  <p class="subtitle">
    Resultados retornados pela API
  </p>

  <nav>
    <a href="/static">Scanner</a>
    <a href="/antigos/historicoistorico">Histórico</a>
  </nav>

</header>

<section class="summary">

  <div class="summary-card">
    <span>Total de scans</span>
    <strong id="totalScans">0</strong>
  </div>

  <div class="summary-card">
    <span>Total de hosts</span>
    <strong id="totalHosts">0</strong>
  </div>

  <div class="summary-card">
    <span>Portas abertas</span>
    <strong id="openPorts">0</strong>
  </div>

  <div class="summary-card">
    <span>Portas filtradas</span>
    <strong id="filteredPorts">0</strong>
  </div>

</section>

<main id="scanContainer"></main>

<script src="/antigos/jstigos/js/historico.js"></script>

</body>
</html>
